name: Terraform CI

on:
  pull_request:
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.TF_BACKEND_REGION }}

      - name: Create backend config
        run: |
          cat > backend.tfbackend <<EOF
          bucket         = "${{ vars.TF_BACKEND_BUCKET }}"
          region         = "${{ vars.TF_BACKEND_REGION }}"
          dynamodb_table = "${{ vars.TF_BACKEND_DYNAMODB_TABLE }}"
          EOF

      - name: Terraform Init
        run: terraform init -input=false -backend-config=backend.tfbackend

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_container_image: ${{ secrets.CONTAINER_IMAGE }}
        run: terraform plan -input=false -no-color